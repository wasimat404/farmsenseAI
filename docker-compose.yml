# Orchestrates the FarmSenseAI backend (FastAPI + TF) and frontend (React)
# Usage:
#   docker compose up --build     # build images and start both services
#   docker compose down           # stop and remove containers

version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: API/Dockerfile
    container_name: farmsense-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Baked into the React bundle at build time
        REACT_APP_API_URL: http://13.60.215.31:8000/predict
    container_name: farmsense-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
